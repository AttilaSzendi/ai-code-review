name: 'AI Code Review'
description: 'AI-powered code review using Claude API — replaces Sentry code review'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-6'
  max-tokens:
    description: 'Max tokens for Claude response'
    required: false
    default: '4096'
  project-context:
    description: 'Additional project-specific review instructions'
    required: false
    default: ''
  exclude-patterns:
    description: 'Comma-separated glob patterns to exclude from diff (e.g. "*.lock,*.min.js")'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: AI Code Review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        MODEL: ${{ inputs.model }}
        MAX_TOKENS: ${{ inputs.max-tokens }}
        PROJECT_CONTEXT: ${{ inputs.project-context }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
      run: bash ${{ github.action_path }}/review.sh
